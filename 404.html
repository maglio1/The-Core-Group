<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Page Not Found | The Core Group</title>
  <link rel="icon" href="Assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#0B1426;--cyan:#00C8F0;--amber:#E8870A;--amber-hot:#F59E0B;--white:#FFFFFF;--mid:#4B5563}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 20px;position:relative;overflow:hidden}
    body::before{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:64px 64px;pointer-events:none}
    .wrap{position:relative;z-index:1;max-width:520px}
    .code{font-family:'Plus Jakarta Sans',sans-serif;font-size:clamp(5rem,15vw,9rem);font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
    h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.6rem;font-weight:700;margin:16px 0 12px}
    p{color:rgba(255,255,255,0.55);font-size:1rem;line-height:1.65;margin-bottom:32px}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.95rem;background:var(--amber);color:var(--white);text-decoration:none;transition:all 0.3s ease;border:2px solid var(--amber)}
    .btn:hover{background:var(--amber-hot);border-color:var(--amber-hot);transform:translateY(-3px);box-shadow:0 10px 36px rgba(232,135,10,0.3)}
    .links{margin-top:20px;display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
    .links a{color:rgba(255,255,255,0.4);font-size:0.85rem;transition:color 0.3s ease;text-decoration:none}.links a:hover{color:var(--cyan)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>This page doesn't exist.</h1>
    <p>Maybe the URL changed, maybe it never existed. Either way, let's get you back to somewhere useful.</p>
    <a href="/" class="btn">Back to Home</a>
    <div class="links">
      <a href="/#services">Services</a>
      <a href="/#contact">Contact Us</a>
      <a href="tel:+17034362716">(703) 436-2716</a>
    </div>
  </div>
</body>
</html>
